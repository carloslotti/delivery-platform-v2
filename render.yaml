# ============================================================
# Render.com Blueprint
# ============================================================
# Sobe Postgres + Redis + API + Web em um único commit.
# Após primeiro deploy, configure NEXT_PUBLIC_API_URL e
# NEXT_PUBLIC_WS_URL no service "delivery-web" com o URL público
# do "delivery-api" (algo como https://delivery-api-xxxx.onrender.com)
# ============================================================

databases:
  - name: delivery-postgres
    databaseName: delivery_platform
    user: delivery
    plan: free
    region: oregon
    postgresMajorVersion: "16"

services:
  - type: redis
    name: delivery-redis
    region: oregon
    plan: free
    ipAllowList: []

  - type: web
    name: delivery-api
    runtime: node
    region: oregon
    plan: free
    rootDir: apps/api
    buildCommand: |
      npm install
      npx prisma generate
      npx prisma db push --accept-data-loss --skip-generate
      npm run build
      node -e "require('child_process').execSync('npx tsx prisma/seed.ts', {stdio:'inherit'})" || true
    startCommand: node dist/main.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: delivery-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: delivery-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PREFIX
        value: api/v1
      - key: CORS_ORIGINS
        value: "*"
      - key: DEFAULT_DELIVERY_BASE_PRICE_CENTS
        value: "600"
      - key: DEFAULT_DRIVER_PAYOUT_CENTS
        value: "400"
      - key: DEFAULT_CREDIT_LIMIT_CENTS
        value: "50000"

  - type: web
    name: delivery-web
    runtime: node
    region: oregon
    plan: free
    rootDir: apps/web
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      # PREENCHER MANUALMENTE NO PAINEL DO RENDER após primeiro deploy:
      # NEXT_PUBLIC_API_URL = https://delivery-api-XXXX.onrender.com/api/v1
      # NEXT_PUBLIC_WS_URL  = https://delivery-api-XXXX.onrender.com
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_WS_URL
        sync: false
