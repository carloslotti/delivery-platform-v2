services:
  postgres:
    image: postgres:16-alpine
    container_name: delivery_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: delivery
      POSTGRES_PASSWORD: delivery_dev_password
      POSTGRES_DB: delivery_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delivery -d delivery_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: delivery_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
